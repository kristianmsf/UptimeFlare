name: Deploy UptimeFlare

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout do repositório
      - uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # 3️⃣ Instalar dependências do projeto
      - name: Install dependencies
        run: |
          npm install
          cd worker
          npm install

      # 4️⃣ Limpar builds antigos
      - name: Clean old builds
        run: |
          rm -rf .vercel/output
          rm -rf worker/dist

      # 5️⃣ Build do Worker
      - name: Build Worker
        run: |
          cd worker
          npx wrangler deploy src/index.ts --outdir dist --dry-run

      # 6️⃣ Build do Pages
      - name: Build Pages
        run: |
          cd ..
          npx @cloudflare/next-on-pages

      # 7️⃣ Deploy Pages + Worker
      - name: Deploy Pages
        run: |
          npx wrangler pages deploy .vercel/output/static --project-name uptimeflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
